<!doctype html>
<!-- @dsCard group="Colors" name="Colors · bio title" subtitle="Forest green for artist name on the biography page only." viewport="700x220" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 28px; }
.tile { width: 200px; height: 160px; padding: 14px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: flex-end; }
.tile-name { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: #DAD8D2; }
.tile-hex { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.04em; color: #FFFFFF; margin-top: 4px; }
.t1 { background: #2F4A2A; }
.demo { flex: 1; max-width: 260px; }
.demo .first { font-family: var(--font-display); font-weight: 400; font-size: 14pt; letter-spacing: 0.04em; color: #2F4A2A; margin: 0; line-height: 1; }
.demo .family { font-family: var(--font-display); font-weight: 400; font-size: 36pt; letter-spacing: 0.10em; text-transform: uppercase; color: #2F4A2A; margin: 4px 0 6px; line-height: 0.92; }
.demo .notes { font-size: 9pt; line-height: 1.45; }
.demo .notes b { font-weight: 500; }
</style></head><body>
<div class="card">
  <div class="tile t1"><span class="tile-name">Bio title</span><span class="tile-hex">#2F4A2A</span></div>
  <div class="demo">
    <p class="first">Aria</p>
    <h2 class="family">Lemaître</h2>
    <p class="notes"><b>Bio-page only.</b> A deepened complement of the accent (forest green against the brown of INHABITED). Used for the artist's first and family name on page 2. Appears nowhere else in the document.</p>
  </div>
</div>
</body></html>
