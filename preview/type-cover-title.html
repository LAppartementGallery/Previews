<!doctype html>
<!-- @dsCard group="Type" name="Type · cover title (display)" subtitle="Inter Display, 300, 0.22em tracking, all caps. Exhibition title on cover." viewport="700x220" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
html, body { background: #2B1A0F; }
.card {
  background: #2B1A0F;
  width: 700px;
  height: 220px;
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.lockup {
  display: inline-block;       /* auto-width to title */
  text-align: right;
}
.title {
  display: block;
  font-family: var(--font-display);
  font-weight: 400;
  font-size: 44pt;
  letter-spacing: 0.06em;
  line-height: 1;
  text-transform: uppercase;
  color: #EFE5D7;
  margin: 0;
  text-align: center;
}
.dates {
  display: block;
  margin-top: 14px;
  margin-right: 0.5em;          /* nudge left to sit under the right edge of the D */
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 9pt;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: #EFE5D7;
  opacity: 0.82;
  text-align: right;
}
</style></head><body>
<div class="card">
  <div class="lockup">
    <h1 class="title">Inhabited</h1>
    <div class="dates">28.05 — 17.07.2026</div>
  </div>
</div>
</body></html>
