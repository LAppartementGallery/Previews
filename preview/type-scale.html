<!doctype html>
<!-- @dsCard group="Type" name="Type · scale ladder" subtitle="Six steps from cover title (58pt) to Artlogic code (7.5pt)." viewport="700x320" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { display: block; padding: 24px 28px; }
.row { display: grid; grid-template-columns: 110px 1fr; align-items: baseline; gap: 18px; padding: 6px 0; border-bottom: 0.5px solid #ECE9E0; }
.row:last-child { border-bottom: none; }
.row .label { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--lapp-ink-muted); }
.s1 { font-family: var(--font-display); font-weight: 400; font-size: 50pt; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1; }
.s2 { font-family: var(--font-display); font-weight: 400; font-size: 28pt; letter-spacing: 0.06em; text-transform: uppercase; line-height: 1; }
.s3 { font-family: var(--font-display); font-weight: 400; font-size: 18pt; letter-spacing: 0.005em; line-height: 1; }
.s4 { font-family: var(--font-body); font-weight: 400; font-size: 11pt; line-height: 1.4; }
.s5 { font-family: var(--font-body); font-weight: 400; font-size: 8.5pt; line-height: 1.4; }
.s6 { font-family: var(--font-body); font-weight: 400; font-size: 8.5pt; letter-spacing: 0.04em; color: var(--lapp-ink-muted); line-height: 1.3; }
</style></head><body>
<div class="card">
  <div class="row"><span class="label">Cover · 50pt</span><span class="s1">Exhibition</span></div>
  <div class="row"><span class="label">Family · 28pt</span><span class="s2">Lemaître</span></div>
  <div class="row"><span class="label">First · 18pt</span><span class="s3">Aria</span></div>
  <div class="row"><span class="label">Body · 11pt</span><span class="s4">She completes between six and nine canvases a year.</span></div>
  <div class="row"><span class="label">Caption · 8.5pt</span><span class="s5">Oil on linen, 200 x 150 cm — 78 3/4 x 59 in.</span></div>
  <div class="row"><span class="label">Code · 8.5pt</span><span class="s6">(LAM-2025-01)</span></div>
</div>
</body></html>
