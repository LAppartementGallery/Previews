<!doctype html>
<!-- @dsCard group="Colors" name="Colors · accent + accent text" subtitle="INHABITED earth brown paired with warm cream. One per exhibition." viewport="700x240" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 28px; }
.tile { width: 220px; height: 170px; padding: 16px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
.tile-name { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; }
.tile-hex { font-family: var(--font-body); font-size: 11px; letter-spacing: 0.04em; }
.tile.accent { background: #875026; color: #EFE5D7; }
.tile.cream { background: #EFE5D7; color: #875026; }
.notes { flex: 1; font-size: 9.5pt; line-height: 1.45; max-width: 220px; }
.notes b { font-weight: 500; }
.notes .small { display: block; font-size: 8.5pt; color: var(--lapp-ink-muted); margin-top: 6px; letter-spacing: 0.04em; }
</style></head><body>
<div class="card">
  <div class="tile accent"><span class="tile-name">Accent (INHABITED)</span><span class="tile-hex">#875026</span></div>
  <div class="tile cream"><span class="tile-name">Accent text</span><span class="tile-hex">#EFE5D7</span></div>
  <div class="notes"><b>Quote-page pair only.</b> One per exhibition, derived from the dominant tones of the works. The cream is never pure white and never saturated — a tinted off-paper.<span class="small">--accent-color · --accent-text-color</span></div>
</div>
</body></html>
