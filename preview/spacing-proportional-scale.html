<!doctype html>
<!-- @dsCard group="Spacing" name="Grid · proportional artwork scaling" subtitle="200×150 cm dominates 30×40 cm — pages do not auto-fill." viewport="700x340" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 28px; align-items: stretch; gap: 22px; }

/* Two mini-A4 pages side by side. */
.mini {
  width: 150px;
  aspect-ratio: 210 / 297;       /* A4 portrait */
  background: #FFFFFF;
  border: 0.5px solid #E2DED4;
  position: relative;
  flex: 0 0 auto;
}
.work {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: #E7E2D8;
  display: grid;
  place-items: center;
  font-family: var(--font-body);
  font-size: 7px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #B5A98F;
  text-align: center;
  line-height: 1.4;
}

/* Threshold — 200 × 150 cm, landscape. Dominates its page but does NOT fill it. */
.mini.big .work {
  width: 116px;            /* of 150 page-width */
  height: 87px;            /* 4:3 landscape */
  top: 46%;
}
/* Quiet Tenant — 30 × 40 cm, portrait. Sits small inside generous white space. */
.mini.small .work {
  width: 54px;             /* proportionally smaller vs the 200cm work, but no longer a stamp */
  height: 72px;            /* 3:4 portrait */
  top: 46%;
}

.label {
  position: absolute;
  bottom: 6px;
  left: 0; right: 0;
  text-align: center;
  font-family: var(--font-body);
  font-size: 7.5pt;
  font-style: italic;
  letter-spacing: 0.01em;
  color: var(--lapp-ink-muted);
}
.dim {
  position: absolute;
  top: 6px;
  right: 8px;
  font-family: var(--font-body);
  font-size: 6.5pt;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--lapp-ink-faint);
}

.spec { flex: 1; font-size: 9.5pt; font-weight: 400; line-height: 1.55; padding-left: 6px; }
.spec b { font-weight: 500; }
.spec .small { display: block; margin-top: 6px; font-size: 8.5pt; color: var(--lapp-ink-muted); letter-spacing: 0.02em; }
</style></head><body>
<div class="card">
  <div class="mini big">
    <span class="dim">200 × 150 cm</span>
    <div class="work">Threshold</div>
    <span class="label">Plate A</span>
  </div>
  <div class="mini small">
    <span class="dim">30 × 40 cm</span>
    <div class="work">Quiet Tenant</div>
    <span class="label">Plate B</span>
  </div>
  <div class="spec">
    <b>Proportional within the page.</b> Each work occupies its own A4 plate. The 200 × 150 cm dominates without filling the page; the 30 × 40 cm sits small inside generous white space.<span class="small">No plate fills the page edge to edge.</span>
  </div>
</div>
</body></html>
