<!doctype html>
<!-- @dsCard group="Components" name="Page · fiche commerciale" subtitle="Centred work block under each plate. Price bold; Sold replaces it bold." viewport="700x260" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 32px 36px; align-items: flex-start; gap: 0; }

.fiche {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 13pt;
  line-height: 1.40;
  color: var(--lapp-black);
  width: 100%;
  max-width: 460px;
}
.fiche .artist {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: 19pt;
  letter-spacing: 0.005em;
  line-height: 1.1;
  margin: 0 0 4px 0;
}
.fiche .artist .family {
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.01em;
}
.fiche .title-year {
  font-weight: 400;
  font-size: 13pt;
  margin: 0 0 14px 0;
}
.fiche .row { display: block; }
.fiche .row.italic { font-style: italic; }
.fiche .price {
  margin-top: 24px;
  font-weight: 500;
  font-size: 16pt;
  letter-spacing: 0.005em;
}
.fiche .price .usd {
  font-weight: 400;
  font-size: 10pt;
  vertical-align: super;
  margin-left: 4px;
  letter-spacing: 0.04em;
}
.fiche .sold {
  margin-top: 24px;
  font-weight: 500;
  font-size: 16pt;
  letter-spacing: 0.14em;
  text-transform: uppercase;
}
</style></head><body>
<div class="card">
  <div class="fiche">
    <p class="artist">Paulo <span class="family">Monteiro</span></p>
    <p class="title-year">Sem título [Untitled], 2015</p>
    <span class="row">Oil on canvas</span>
    <span class="row">145 x 185 cm</span>
    <span class="row italic">57 1/8 x 72 7/8 in.</span>
    <span class="row">(PMO-01)</span>
    <p class="price">Price (excl. VAT): 75'000<span class="usd">USD</span></p>
  </div>
</div>
</body></html>
