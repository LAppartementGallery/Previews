<!doctype html>
<!-- @dsCard group="Components" name="Sequence · canonical 9 pages" subtitle="Cover · Bio · Quote · Plate · Close-up · Plate · Close-up · Detail · L'Appartement." viewport="700x230" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 24px 28px; flex-direction: column; align-items: stretch; gap: 14px; }
h3 { font-family: var(--font-body); font-weight: 500; font-size: 9px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--lapp-ink-muted); margin: 0; }
.row { display: flex; gap: 6px; align-items: stretch; }
.thumb { flex: 1; aspect-ratio: 210 / 297; background: #FFFFFF; border: 0.5px solid #ECE9E0; position: relative; overflow: hidden; }
.thumb .num { position: absolute; top: 4px; left: 5px; font-family: var(--font-body); font-size: 7px; letter-spacing: 0.14em; color: var(--lapp-ink-muted); }
.thumb .name { position: absolute; bottom: 4px; left: 5px; right: 5px; font-family: var(--font-body); font-size: 7px; letter-spacing: 0.06em; color: #4a4a4a; text-align: center; }
.thumb.cover { background: linear-gradient(180deg,#2A1A10,#1A0F08); }
.thumb.cover .name, .thumb.cover .num, .thumb.quote .name, .thumb.quote .num { color: rgba(239,229,215,0.7); }
.thumb.cover .title-mini { position: absolute; left: 0; right: 0; top: 24%; text-align: center; font-family: var(--font-display); font-weight: 400; font-size: 9px; letter-spacing: 0.22em; text-transform: uppercase; color: #EFE5D7; }
.thumb.bio .name-mini { position: absolute; left: 6px; top: 12px; font-family: var(--font-display); font-weight: 400; font-size: 12px; letter-spacing: 0.10em; text-transform: uppercase; color: #2F4A2A; line-height: 0.9; }
.thumb.bio .port { position: absolute; left: 6px; top: 36px; width: 32px; height: 42px; background: #E7E2D8; }
.thumb.bio .lines { position: absolute; left: 42px; right: 6px; top: 38px; display: flex; flex-direction: column; gap: 2px; }
.thumb.bio .lines i { display: block; height: 1px; background: #B5A98F; }
.thumb.bio .lines i:nth-child(2) { width: 90%; }
.thumb.bio .lines i:nth-child(3) { width: 96%; }
.thumb.bio .lines i:nth-child(4) { width: 80%; }
.thumb.quote { background: #875026; }
.thumb.quote .qm { position: absolute; font-family: var(--font-display); font-weight: 400; font-size: 32pt; line-height: 0.5; color: #EFE5D7; }
.thumb.quote .qm.o { top: 4px; left: 5px; }
.thumb.quote .qm.c { bottom: -2px; right: 5px; }
.thumb.work .rect { position: absolute; background: #E7E2D8; }
.thumb.work .rect.big { inset: 14px 14px 36px; }
.thumb.work .rect.small { left: 50%; transform: translateX(-50%); top: 30px; width: 26px; height: 32px; }
.thumb.work .fiche { position: absolute; left: 0; right: 0; bottom: 8px; text-align: center; font-size: 6px; line-height: 1.3; color: #4a4a4a; }
.thumb.closeup { background: linear-gradient(135deg,#2D1E15,#15100C); }
.thumb.detail .ll { position: absolute; left: 8px; top: 14px; right: 8px; }
.thumb.detail .ll b { display: block; font-family: var(--font-body); font-size: 7px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--lapp-ink-muted); border-bottom: 0.4px solid #0A0A0A; padding-bottom: 1px; margin-bottom: 3px; }
.thumb.detail .ll i { display: block; height: 1px; background: #B5A98F; margin-bottom: 2px; }
.thumb.detail .ll i:nth-child(odd) { width: 86%; }
.thumb.final .logo-line { position: absolute; left: 50%; top: 18px; transform: translateX(-50%); font-family: var(--font-display); font-weight: 400; font-size: 7px; letter-spacing: 0.22em; text-transform: uppercase; }
.thumb.final .bldg { position: absolute; left: 50%; top: 38px; transform: translateX(-50%); width: 20px; height: 30px; border: 0.5px solid #0A0A0A; }
.thumb.final .lines { position: absolute; left: 8px; right: 8px; bottom: 10px; display: flex; flex-direction: column; gap: 2px; }
.thumb.final .lines i { display: block; height: 1px; background: #B5A98F; }
</style></head><body>
<div class="card">
  <h3>Canonical sequence — 9 pages</h3>
  <div class="row">
    <div class="thumb cover"><span class="num">01</span><div class="title-mini">Inhabited</div><span class="name">Cover</span></div>
    <div class="thumb bio"><span class="num">02</span><div class="name-mini">LEM</div><div class="port"></div><div class="lines"><i></i><i></i><i></i><i></i></div><span class="name">Bio</span></div>
    <div class="thumb quote"><span class="num">03</span><span class="qm o">&ldquo;</span><span class="qm c">&rdquo;</span><span class="name">Quote</span></div>
    <div class="thumb work"><span class="num">04</span><div class="rect big"></div><div class="fiche">Threshold, 2025</div><span class="name">Plate A</span></div>
    <div class="thumb closeup"><span class="num">05</span><span class="name">Close-up A</span></div>
    <div class="thumb work"><span class="num">06</span><div class="rect small"></div><div class="fiche">Quiet Tenant</div><span class="name">Plate B</span></div>
    <div class="thumb closeup"><span class="num">07</span><span class="name">Close-up B</span></div>
    <div class="thumb detail"><span class="num">08</span><div class="ll"><b>Prov.</b><i></i><i></i><b style="margin-top:6px;">Exhib.</b><i></i><i></i></div><span class="name">Detail</span></div>
    <div class="thumb final"><span class="num">09</span><div class="logo-line">L'A</div><div class="bldg"></div><div class="lines"><i></i><i></i><i></i></div><span class="name">L'Appartement</span></div>
  </div>
</div>
</body></html>
