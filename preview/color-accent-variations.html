<!doctype html>
<!-- @dsCard group="Colors" name="Colors · accent palette options" subtitle="Five sample accent/cream pairs for different exhibitions." viewport="700x220" --><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css">
<style>
.card { padding: 28px; flex-direction: column; align-items: stretch; }
.heading { font-family: var(--font-body); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--lapp-ink-muted); margin: 0 0 14px; }
.row { display: flex; gap: 10px; }
.pair { flex: 1; }
.swatch-pair { display: grid; grid-template-columns: 1fr 1fr; height: 90px; }
.swatch-pair > div { display: flex; flex-direction: column; justify-content: flex-end; padding: 8px; }
.swatch-pair .acc { color: #fff; }
.swatch-pair .txt { }
.hex { font-family: var(--font-body); font-size: 9.5px; letter-spacing: 0.04em; }
.name { font-family: var(--font-body); font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; margin-top: 4px; text-align: center; color: var(--lapp-ink-muted); }
</style></head><body>
<div class="card">
  <h3 class="heading">Accent palette — exhibition variations</h3>
  <div class="row">
    <div class="pair">
      <div class="swatch-pair">
        <div class="acc" style="background:#875026;"><span class="hex">#875026</span></div>
        <div class="txt" style="background:#EFE5D7;color:#875026;"><span class="hex">#EFE5D7</span></div>
      </div>
      <div class="name">Earth brown · INHABITED</div>
    </div>
    <div class="pair">
      <div class="swatch-pair">
        <div class="acc" style="background:#2F4A2A;"><span class="hex">#2F4A2A</span></div>
        <div class="txt" style="background:#F0F2EC;color:#2F4A2A;"><span class="hex">#F0F2EC</span></div>
      </div>
      <div class="name">Forest green</div>
    </div>
    <div class="pair">
      <div class="swatch-pair">
        <div class="acc" style="background:#1B2A4A;"><span class="hex">#1B2A4A</span></div>
        <div class="txt" style="background:#E8EBF1;color:#1B2A4A;"><span class="hex">#E8EBF1</span></div>
      </div>
      <div class="name">Indigo night</div>
    </div>
    <div class="pair">
      <div class="swatch-pair">
        <div class="acc" style="background:#A87327;"><span class="hex">#A87327</span></div>
        <div class="txt" style="background:#F3ECDE;color:#A87327;"><span class="hex">#F3ECDE</span></div>
      </div>
      <div class="name">Ochre</div>
    </div>
    <div class="pair">
      <div class="swatch-pair">
        <div class="acc" style="background:#6B1F1F;"><span class="hex">#6B1F1F</span></div>
        <div class="txt" style="background:#F1E4E0;color:#6B1F1F;"><span class="hex">#F1E4E0</span></div>
      </div>
      <div class="name">Wine</div>
    </div>
  </div>
</div>
</body></html>
